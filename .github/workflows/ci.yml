name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: Run the complete repository validation
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan affected validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      mode: ${{ steps.impact.outputs.mode }}
      run-linux: ${{ steps.impact.outputs.run-linux }}
      run-windows: ${{ steps.impact.outputs.run-windows }}
      run-public-release: ${{ steps.impact.outputs.run-public-release }}
      run-coverage: ${{ steps.impact.outputs.run-coverage }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Test CI tooling
        shell: pwsh
        run: ./tools/Ci/Test-CiTooling.ps1

      - name: Test package metadata tooling
        shell: pwsh
        run: ./tools/PackageMetadata/Test-PackageMetadata.ps1

      - name: Test package catalog tooling
        shell: pwsh
        run: ./tools/PackageCatalog/Test-PackageCatalog.ps1

      - name: Resolve affected validation
        id: impact
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_FULL: ${{ github.event_name == 'push' || inputs.full == true || contains(github.event.pull_request.labels.*.name, 'ci:full') }}
        run: |
          $forceFull = [bool]::Parse($env:FORCE_FULL)
          ./tools/Ci/Resolve-CiImpact.ps1 `
            -BaseSha $env:BASE_SHA `
            -HeadSha $env:HEAD_SHA `
            -EventName '${{ github.event_name }}' `
            -ForceFull:$forceFull `
            -OutputPath artifacts/ci/impact.json `
            -GitHubOutput $env:GITHUB_OUTPUT

      - name: Upload impact plan
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-impact-plan
          path: artifacts/ci
          if-no-files-found: warn
          retention-days: 14

  linux:
    name: Linux affected validation
    needs: plan
    if: needs.plan.outputs.run-linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Set up Python 3.14
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.14'
      - name: Download impact plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-impact-plan
          path: artifacts/ci

      - name: Validate affected slices
        shell: pwsh
        run: |
          $env:DOTNET_HOST_PATH = (Get-Command dotnet).Source
          $env:POCOK_CSHARP_WORKER_DIRECTORY = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.CSharp.Worker/bin/Release/net10.0'
          $env:POCOK_PYTHON_EXECUTABLE = (Get-Command python).Source
          $env:POCOK_PYTHON_WORKER_PATH = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.Python/Worker/pocok_worker.py'
          ./tools/Ci/Invoke-AffectedValidation.ps1 -Platform Linux

      - name: Upload Linux results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-linux-results
          path: |
            artifacts/test-results/**
            artifacts/coverage/head/**
            artifacts/packages/**
            artifacts/package-smoke/**
            artifacts/trimmed-conversion/**
          if-no-files-found: warn
          retention-days: 14

  windows:
    name: Windows affected validation
    needs: plan
    if: needs.plan.outputs.run-windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Set up Python 3.14
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.14'
      - name: Download impact plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-impact-plan
          path: artifacts/ci

      - name: Validate affected slices
        shell: pwsh
        run: |
          $env:DOTNET_HOST_PATH = (Get-Command dotnet).Source
          $env:POCOK_CSHARP_WORKER_DIRECTORY = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.CSharp.Worker/bin/Release/net10.0'
          $env:POCOK_PYTHON_EXECUTABLE = (Get-Command python).Source
          $env:POCOK_PYTHON_WORKER_PATH = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.Python/Worker/pocok_worker.py'
          ./tools/Ci/Invoke-AffectedValidation.ps1 -Platform Windows

      - name: Upload Windows results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-windows-results
          path: |
            artifacts/test-results/**
            artifacts/trimmed-conversion/**
          if-no-files-found: warn
          retention-days: 14

  public-release:
    name: Public release validation
    needs: plan
    if: needs.plan.outputs.run-public-release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Validate public release configuration
        shell: pwsh
        run: ./tools/Ci/Invoke-PublicReleaseValidation.ps1

  coverage:
    name: Compare affected coverage
    needs: [plan, linux]
    if: github.event_name == 'pull_request' && needs.plan.outputs.run-coverage == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Download impact plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-impact-plan
          path: artifacts/ci

      - name: Download head coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-linux-results
          path: artifacts

      - name: Compare with exact base SHA
        shell: pwsh
        run: ./tools/Ci/Invoke-SliceCoverageComparison.ps1

      - name: Upload coverage comparison
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-coverage
          path: artifacts/coverage/**
          if-no-files-found: warn
          retention-days: 14

  gate:
    name: CI gate
    if: always()
    needs: [plan, linux, windows, public-release, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required jobs
        shell: pwsh
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          PUBLIC_RELEASE_RESULT: ${{ needs.public-release.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          REQUIRE_LINUX: ${{ needs.plan.outputs.run-linux }}
          REQUIRE_WINDOWS: ${{ needs.plan.outputs.run-windows }}
          REQUIRE_PUBLIC_RELEASE: ${{ needs.plan.outputs.run-public-release }}
          REQUIRE_COVERAGE: ${{ github.event_name == 'pull_request' && needs.plan.outputs.run-coverage == 'true' }}
        run: |
          if ($env:PLAN_RESULT -ne 'success') {
            throw "Planning did not succeed: $env:PLAN_RESULT"
          }
          if ($env:REQUIRE_LINUX -eq 'true' -and $env:LINUX_RESULT -ne 'success') {
            throw "Required Linux validation did not succeed: $env:LINUX_RESULT"
          }
          if ($env:REQUIRE_WINDOWS -eq 'true' -and $env:WINDOWS_RESULT -ne 'success') {
            throw "Required Windows validation did not succeed: $env:WINDOWS_RESULT"
          }
          if ($env:REQUIRE_PUBLIC_RELEASE -eq 'true' -and $env:PUBLIC_RELEASE_RESULT -ne 'success') {
            throw "Required public release validation did not succeed: $env:PUBLIC_RELEASE_RESULT"
          }
          if ($env:REQUIRE_COVERAGE -eq 'true' -and $env:COVERAGE_RESULT -ne 'success') {
            throw "Required coverage comparison did not succeed: $env:COVERAGE_RESULT"
          }
          Write-Host 'All required CI jobs succeeded.'
  readme-coverage:
    name: Update README coverage
    needs: [linux, gate]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.linux.result == 'success' && needs.gate.result == 'success'
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main

      - name: Download impact plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-impact-plan
          path: artifacts/ci

      - name: Download main coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ci-linux-results
          path: artifacts

      - name: Refresh README coverage block
        shell: pwsh
        run: ./tools/Ci/Update-ReadmeCoverage.ps1

      - name: Commit refreshed coverage
        shell: pwsh
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          $currentMain = [string](& git rev-parse origin/main)
          if ($LASTEXITCODE -ne 0) {
            throw "Could not resolve origin/main."
          }
          $currentMain = $currentMain.Trim()
          if ($currentMain -ne $env:EXPECTED_SHA) {
            Write-Host "Main advanced from $env:EXPECTED_SHA to $currentMain; the newer CI run will refresh coverage."
            return
          }

          git diff --quiet -- README.md
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'README coverage is already current.'
            return
          }
          if ($LASTEXITCODE -ne 1) {
            throw "Could not inspect README changes."
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'docs: refresh coverage summary [skip ci]'
          if ($LASTEXITCODE -ne 0) {
            throw "Could not commit README coverage."
          }

          git push origin HEAD:main
          if ($LASTEXITCODE -eq 0) {
            return
          }

          git fetch origin main
          $latestMain = ([string](& git rev-parse origin/main)).Trim()
          if ($latestMain -ne $env:EXPECTED_SHA) {
            Write-Warning "Main advanced while publishing coverage; the newer CI run will refresh README."
            return
          }
          throw "Could not push README coverage update."
