name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Test package metadata tooling
        shell: pwsh
        run: ./tools/PackageMetadata/Test-PackageMetadata.ps1

      - name: Restore
        run: dotnet restore Pocok.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format Pocok.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Pocok.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Pocok.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results

      - name: Run core samples
        shell: pwsh
        run: |
          dotnet run --project samples/Conversion.Console/Conversion.Console.csproj --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) { throw 'Conversion sample failed.' }
          dotnet run --project samples/Readiness.Console/Readiness.Console.csproj --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) { throw 'Readiness sample failed.' }
          dotnet run --project samples/AppDefaults.Console/Pocok.AppDefaults.Console.csproj --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) { throw 'AppDefaults sample failed.' }
          dotnet run --project samples/Operations.Worker/Pocok.Operations.Worker.csproj --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) { throw 'Operations worker sample failed.' }

      - name: Publish trimmed Conversion sample
        shell: pwsh
        run: |
          dotnet publish samples/Conversion.Trimmed/Conversion.Trimmed.csproj --configuration Release --output artifacts/trimmed-conversion
          if ($LASTEXITCODE -ne 0) { throw 'Trimmed Conversion sample publish failed.' }
          dotnet artifacts/trimmed-conversion/Conversion.Trimmed.dll
          if ($LASTEXITCODE -ne 0) { throw 'Trimmed Conversion sample execution failed.' }

      - name: Pack
        run: dotnet pack Pocok.slnx --configuration Release --no-build --output artifacts/packages

      - name: Test package from local feed
        shell: pwsh
        run: ./tools/PackageSmoke/Invoke-PackageSmoke.ps1 -NoPack

      - name: Audit public contents
        shell: pwsh
        run: ./tools/PublicReleaseAudit/Invoke-PublicReleaseAudit.ps1
