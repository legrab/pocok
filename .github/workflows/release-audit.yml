name: Release audit

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build and test
        run: dotnet test --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output artifacts/packages

      - name: Test package from local feed
        shell: pwsh
        run: ./tools/PackageSmoke/Invoke-PackageSmoke.ps1 -NoPack

      - name: Audit package contents
        shell: pwsh
        run: ./tools/PublicReleaseAudit/Invoke-PublicReleaseAudit.ps1
