name: Release audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Pocok.slnx

      - name: Build and test
        run: dotnet test Pocok.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Pocok.slnx --configuration Release --no-build --output artifacts/packages

      - name: Test package from local feed
        shell: pwsh
        run: ./tools/PackageSmoke/Invoke-PackageSmoke.ps1 -NoPack

      - name: Audit package contents
        shell: pwsh
        run: ./tools/PublicReleaseAudit/Invoke-PublicReleaseAudit.ps1
