name: Showcase

on:
  push:
    branches:
      - main
    paths:
      - "showcase/**"
      - "samples/Showcase/**"
      - "src/**"
      - "eng/packages.json"
      - "Directory.*"
      - "global.json"
      - ".github/workflows/showcase.yml"
  pull_request:
    paths:
      - "showcase/**"
      - "samples/Showcase/**"
      - "src/**"
      - "eng/packages.json"
      - "Directory.*"
      - "global.json"
      - ".github/workflows/showcase.yml"
  workflow_dispatch:

jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Restore
        shell: pwsh
        run: |
          Remove-Item Env:PLATFORM -ErrorAction SilentlyContinue
          dotnet restore showcase/Pocok.Showcase.slnx --verbosity minimal
          dotnet restore showcase/Pocok.Showcase.Samples.slnx --verbosity minimal
      - name: Format
        shell: pwsh
        run: |
          Remove-Item Env:PLATFORM -ErrorAction SilentlyContinue
          dotnet format showcase/Pocok.Showcase.slnx --verify-no-changes --no-restore
          dotnet format showcase/Pocok.Showcase.Samples.slnx --verify-no-changes --no-restore
      - name: Build
        shell: pwsh
        run: |
          Remove-Item Env:PLATFORM -ErrorAction SilentlyContinue
          dotnet build showcase/Pocok.Showcase.slnx --configuration Release --no-restore --verbosity minimal
          dotnet build showcase/Pocok.Showcase.Samples.slnx --configuration Release --no-restore --verbosity minimal
      - name: Test
        shell: pwsh
        run: |
          Remove-Item Env:PLATFORM -ErrorAction SilentlyContinue
          $env:DOTNET_HOST_PATH = (Get-Command dotnet).Source
          $env:POCOK_CSHARP_WORKER_DIRECTORY = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.CSharp.Worker/bin/Release/net10.0'
          $env:POCOK_PYTHON_EXECUTABLE = (Get-Command python).Source
          $env:POCOK_PYTHON_WORKER_PATH = Join-Path $env:GITHUB_WORKSPACE 'src/Scripting.Python/Worker/pocok_worker.py'
          dotnet test showcase/tests/Pocok.Showcase.Tests/Pocok.Showcase.Tests.csproj --configuration Release --no-build --verbosity minimal
          dotnet test samples/Showcase/Pocok.Showcase.Samples.Tests/Pocok.Showcase.Samples.Tests.csproj --configuration Release --no-build --verbosity minimal
      - name: Publish with Bash
        if: runner.os == 'Linux'
        run: bash showcase/scripts/publish-showcase.sh "${{ runner.temp }}/pocok-showcase" --no-restore --require-complete
      - name: Publish with PowerShell on Linux
        if: runner.os == 'Linux'
        shell: pwsh
        run: ./showcase/scripts/publish-showcase.ps1 -OutputPath "${{ runner.temp }}/pocok-showcase-pwsh" -NoRestore -RequireComplete
      - name: Publish with PowerShell on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./showcase/scripts/publish-showcase.ps1 -OutputPath "${{ runner.temp }}/pocok-showcase" -NoRestore -RequireComplete
      - name: Smoke
        run: python showcase/scripts/smoke-showcase.py "${{ runner.temp }}/pocok-showcase"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build image
        run: docker build --file showcase/Dockerfile --tag pocok-showcase:ci .
      - name: Smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --rm --name pocok-showcase-ci \
            -e Showcase__RequireCompleteCatalog=true \
            -p 8080:8080 pocok-showcase:ci
          cleanup() {
            docker logs pocok-showcase-ci || true
            docker stop pocok-showcase-ci || true
          }
          trap cleanup EXIT
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health/ready >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/health/live >/dev/null
          curl --fail --silent http://127.0.0.1:8080/ >/dev/null
          for slug in conversion readiness app-defaults app-defaults-logging app-defaults-logging-serilog \
              modularity-contracts modularity app-defaults-modularity background-work scripting \
              scripting-javascript scripting-csharp scripting-python localization signals subscriptions \
              licensing app-defaults-licensing; do
            curl --fail --silent "http://127.0.0.1:8080/packages/$slug" >/dev/null
          done
          curl --fail --silent http://127.0.0.1:8080/system >/dev/null
      - name: Non-default port
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --rm --name pocok-showcase-port-ci \
            -e PORT=9090 \
            -e Showcase__RequireCompleteCatalog=true \
            -p 9090:9090 pocok-showcase:ci
          cleanup() {
            docker logs pocok-showcase-port-ci || true
            docker stop pocok-showcase-port-ci || true
          }
          trap cleanup EXIT
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:9090/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
