name: Showcase Keepalive

on:
  schedule:
    - cron: "7,19,31,43,55 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: showcase-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping deployed showcase
        shell: bash
        run: |
          set -euo pipefail
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 180 \
            https://pocok-showcase.onrender.com/health/ready \
            > /dev/null
